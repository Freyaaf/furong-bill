<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>傅副官的账本</title>
  <link rel="stylesheet" href="style.css?v=20260428a">
  <link rel="manifest" href="manifest.json?v=2">
  <meta name="theme-color" content="#F5F0F7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png?v=2">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=2">
  <style>
    #lock-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(160deg, #FAF6F0 0%, #F5F0F7 35%, #EDE2F0 70%, #E8E1EC 100%);
      display: flex; align-items: center; justify-content: center;
    }
    #lock-screen.hidden { display: none; }
    .lock-box {
      background: #FAF6F0; border: 1px solid #E8E1EC; border-radius: 4px;
      padding: 40px 28px; text-align: center;
      box-shadow: 0 2px 12px rgba(92,78,110,.06);
      max-width: 300px; width: 88%;
    }
    .lock-box .icon {
      font-size: 28px; margin-bottom: 12px;
      color: var(--aubergine, #5C4E6E); letter-spacing: 0.3em;
      font-family: 'Kaiti SC', 'STKaiti', 'KaiTi', '楷体', serif;
    }
    .lock-box h2 {
      font-size: 20px; color: #2B2438; margin-bottom: 6px;
      font-weight: bold; letter-spacing: 0.25em;
      font-family: 'Kaiti SC', 'STKaiti', 'KaiTi', '楷体', serif;
    }
    .lock-box .hint {
      font-size: 14px; color: #5C4E6E; margin-bottom: 24px;
      font-family: 'Kaiti SC', 'STKaiti', 'KaiTi', '楷体', serif;
      letter-spacing: 0.1em;
    }
    .lock-box input[type="email"],
    .lock-box input[type="password"] {
      width: 100%; padding: 12px; border: 1px solid #D9C9E0; border-radius: 4px;
      font-size: 16px; text-align: center; outline: none; background: #F5F0F7; color: #2B2438;
      font-family: 'Kaiti SC', 'STKaiti', 'KaiTi', '楷体', serif;
    }
    .lock-box input:focus { border-color: #A896B8; box-shadow: 0 0 0 2px rgba(168,150,184,.12); }
    .lock-box button {
      width: 100%; margin-top: 14px; padding: 12px;
      background: rgba(92,78,110,0.82); color: #F5F0F7;
      border: none; border-radius: 4px; font-size: 16px; font-weight: bold;
      cursor: pointer; box-shadow: 0 2px 8px rgba(92,78,110,.15);
      font-family: 'Kaiti SC', 'STKaiti', 'KaiTi', '楷体', serif;
      letter-spacing: 0.2em;
    }
    .lock-box .err {
      color: #A64B4B; font-size: 13px; margin-top: 10px; display: none;
      font-family: 'Kaiti SC', 'STKaiti', 'KaiTi', '楷体', serif;
    }
  </style>
</head>
<body>
  <div id="lock-screen">
    <div class="lock-box">
      <div class="icon">账</div>
      <h2>傅副官的账本</h2>
      <p class="hint">花了什么，让我看看。</p>
      <input type="email" id="lock-email" placeholder="邮箱" autofocus>
      <input type="password" id="lock-pw" placeholder="密码" style="margin-top:10px">
      <button id="lock-btn">开门</button>
      <p class="err" id="lock-err">不对，再想想？</p>
    </div>
  </div>

  <div id="app">
    <header class="app-header">
      <h1>傅副官的账本</h1>
    </header>

    <main class="app-main">
      <!-- 记账 -->
      <section id="tab-add" class="tab-content active">
        <div class="greeting-card" id="greeting-card"></div>
        <div class="type-toggle" id="type-toggle">
          <button type="button" class="type-btn selected" data-type="expense">支出</button>
          <button type="button" class="type-btn" data-type="income">收入</button>
        </div>
        <form id="add-form" class="card">
          <div class="form-group">
            <label for="bill-date">日期</label>
            <input type="date" id="bill-date" required>
          </div>
          <div class="form-group">
            <label for="bill-item">物品/服务</label>
            <input type="text" id="bill-item" placeholder="吃了什么 / 买了什么" required>
          </div>
          <div class="form-group">
            <label for="bill-amount">金额（元）</label>
            <input type="text" id="bill-amount" inputmode="none" placeholder="0.00" required readonly>
            <div class="numpad hidden" id="numpad">
              <div class="numpad-row">
                <button type="button" class="numpad-key">1</button>
                <button type="button" class="numpad-key">2</button>
                <button type="button" class="numpad-key">3</button>
              </div>
              <div class="numpad-row">
                <button type="button" class="numpad-key">4</button>
                <button type="button" class="numpad-key">5</button>
                <button type="button" class="numpad-key">6</button>
              </div>
              <div class="numpad-row">
                <button type="button" class="numpad-key">7</button>
                <button type="button" class="numpad-key">8</button>
                <button type="button" class="numpad-key">9</button>
              </div>
              <div class="numpad-row">
                <button type="button" class="numpad-key">.</button>
                <button type="button" class="numpad-key">0</button>
                <button type="button" class="numpad-key numpad-del">⌫</button>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>类别</label>
            <div class="chips" id="category-chips"></div>
          </div>
          <div class="form-group" id="satisfaction-group">
            <label>满足感</label>
            <div class="satisfaction-bar" id="satisfaction-bar"></div>
          </div>
          <div class="form-group" id="reason-group">
            <label for="bill-reason">原因说明 <span class="text-muted">选填</span></label>
            <textarea id="bill-reason" rows="2" placeholder="为什么满足/不满足？随便写写"></textarea>
          </div>
          <div class="form-group hidden" id="income-note-group">
            <label for="bill-reason-income">备注 <span class="text-muted">选填</span></label>
            <textarea id="bill-reason-income" rows="2" placeholder="来源说明"></textarea>
          </div>
          <button type="submit" class="btn-primary" id="submit-btn">记一笔</button>
        </form>
      </section>

      <!-- 账单 -->
      <section id="tab-bills" class="tab-content">
        <div class="month-nav">
          <button type="button" class="month-arrow" id="bills-prev">‹</button>
          <span class="month-label" id="bills-month-label"></span>
          <button type="button" class="month-arrow" id="bills-next">›</button>
        </div>
        <div class="bills-filter" id="bills-filter"></div>
        <div class="month-summary-bar" id="bills-summary-bar"></div>
        <div id="bills-list"></div>
      </section>

      <!-- 总结 -->
      <section id="tab-summary" class="tab-content">
        <div class="month-nav">
          <button type="button" class="month-arrow" id="summary-prev">‹</button>
          <span class="month-label" id="summary-month-label"></span>
          <button type="button" class="month-arrow" id="summary-next">›</button>
        </div>
        <div id="summary-content"></div>
      </section>

      <!-- 搜索 -->
      <section id="tab-search" class="tab-content">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="搜索物品、原因...">
        </div>
        <div class="search-filters">
          <select id="search-category">
            <option value="">全部类别</option>
          </select>
          <select id="search-satisfaction">
            <option value="">全部满足感</option>
          </select>
        </div>
        <div id="search-results"></div>
      </section>

      <!-- 预算 -->
      <section id="tab-budget" class="tab-content">
        <div class="card">
          <h3>月度预算设置</h3>
          <div class="form-group">
            <label>选择月份</label>
            <input type="month" id="budget-month">
          </div>
          <div class="form-group">
            <label for="budget-total">每月总预算（元）</label>
            <input type="number" id="budget-total" step="1" min="0" placeholder="不设上限">
          </div>
          <div id="category-budgets"></div>
          <button type="button" class="btn-primary" id="save-budget-btn">保存预算</button>
        </div>
        <div class="card" id="budget-status" style="margin-top:12px"></div>
        <div class="card" style="margin-top:12px">
          <h3>数据导出</h3>
          <p style="font-size:13px;color:var(--snow-grey);margin-bottom:12px">导出所有账单记录为 Excel 文件</p>
          <button type="button" class="btn-primary" id="export-btn">导出 Excel</button>
        </div>
      </section>
    </main>

    <nav class="app-nav">
      <button class="nav-btn active" data-tab="add">
        <span class="nav-icon">记</span>
        <span class="nav-label">记账</span>
      </button>
      <button class="nav-btn" data-tab="bills">
        <span class="nav-icon">册</span>
        <span class="nav-label">账单</span>
      </button>
      <button class="nav-btn" data-tab="summary">
        <span class="nav-icon">览</span>
        <span class="nav-label">总结</span>
      </button>
      <button class="nav-btn" data-tab="search">
        <span class="nav-icon">寻</span>
        <span class="nav-label">搜索</span>
      </button>
      <button class="nav-btn" data-tab="budget">
        <span class="nav-icon">算</span>
        <span class="nav-label">预算</span>
      </button>
    </nav>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (function() {
    var SB_URL = 'https://otpcdlgwlaifirhfnnat.supabase.co';
    var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im90cGNkbGd3bGFpZmlyaGZubmF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4ODQ5NzQsImV4cCI6MjA5MTQ2MDk3NH0.nC92brW3QJPbkh9IQ8q3-S6W-Mw8WLtcKXoIJ-8xkHo';
    var authClient = window.supabase.createClient(SB_URL, SB_KEY);

    document.getElementById('app').style.display = 'none';

    authClient.auth.getSession().then(function(res) {
      if (res.data.session) {
        document.getElementById('lock-screen').classList.add('hidden');
        document.getElementById('app').style.display = '';
      }
    });

    async function tryLogin() {
      var email = document.getElementById('lock-email').value.trim();
      var pw = document.getElementById('lock-pw').value;
      var btn = document.getElementById('lock-btn');
      btn.disabled = true;
      btn.textContent = '登录中...';
      var { error } = await authClient.auth.signInWithPassword({ email: email, password: pw });
      btn.disabled = false;
      btn.textContent = '开门';
      if (error) {
        document.getElementById('lock-err').style.display = 'block';
      } else {
        document.getElementById('lock-screen').classList.add('hidden');
        document.getElementById('app').style.display = '';
      }
    }
    document.getElementById('lock-btn').addEventListener('click', tryLogin);
    document.getElementById('lock-pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') tryLogin();
    });
  })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
  (function(){
    var s = document.createElement('script');
    s.src = 'app.js?v=' + Date.now();
    document.body.appendChild(s);
  })();
  </script>
</body>
</html>
