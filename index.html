<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <title>傅副官的账本</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#e07c5a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📒</text></svg>">
  <style>
    #lock-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(160deg, #FAF6F0 0%, #F5F0F7 35%, #EDE2F0 70%, #E8E1EC 100%);
      display: flex; align-items: center; justify-content: center;
    }
    #lock-screen.hidden { display: none; }
    .lock-box {
      background: #FAF6F0; border: 1px solid #D9C9E0; border-radius: 16px;
      padding: 40px 28px; text-align: center;
      box-shadow: 0 4px 20px rgba(92,78,110,.1);
      max-width: 300px; width: 88%;
    }
    .lock-box .icon { font-size: 48px; margin-bottom: 12px; }
    .lock-box h2 { font-size: 18px; color: #5C4E6E; margin-bottom: 6px; }
    .lock-box .hint { font-size: 13px; color: #A896B8; margin-bottom: 24px; }
    .lock-box input {
      width: 100%; padding: 12px; border: 1.5px solid #D9C9E0; border-radius: 8px;
      font-size: 15px; text-align: center; outline: none; background: #F5F0F7; color: #3D3450;
    }
    .lock-box input:focus { border-color: #8E7AA8; box-shadow: 0 0 0 3px rgba(142,122,168,.12); }
    .lock-box button {
      width: 100%; margin-top: 14px; padding: 12px;
      background: linear-gradient(135deg, #8E7AA8, #5C4E6E); color: #F5F0F7;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; box-shadow: 0 3px 12px rgba(92,78,110,.2);
    }
    .lock-box .err { color: #A64B4B; font-size: 13px; margin-top: 10px; display: none; }
  </style>
</head>
<body>
  <div id="lock-screen">
    <div class="lock-box">
      <div class="icon">📒</div>
      <h2>傅副官的账本</h2>
      <p class="hint">只有我们能进来哦</p>
      <input type="password" id="lock-pw" placeholder="输入密码" autofocus>
      <button id="lock-btn">进入</button>
      <p class="err" id="lock-err">密码不对，再试试？</p>
    </div>
  </div>

  <div id="app">
    <header class="app-header">
      <h1>📒 傅副官的账本</h1>
    </header>

    <main class="app-main">
      <!-- 记账 -->
      <section id="tab-add" class="tab-content active">
        <div class="greeting-card" id="greeting-card"></div>
        <form id="add-form" class="card">
          <div class="form-group">
            <label for="bill-date">日期</label>
            <input type="date" id="bill-date" required>
          </div>
          <div class="form-group">
            <label for="bill-item">物品/服务</label>
            <input type="text" id="bill-item" placeholder="吃了什么 / 买了什么" required>
          </div>
          <div class="form-group">
            <label for="bill-amount">金额（元）</label>
            <input type="number" id="bill-amount" inputmode="decimal" step="0.01" min="0" placeholder="0.00" required>
          </div>
          <div class="form-group">
            <label>类别</label>
            <div class="chips" id="category-chips"></div>
          </div>
          <div class="form-group">
            <label>满足感</label>
            <div class="satisfaction-bar" id="satisfaction-bar"></div>
          </div>
          <div class="form-group">
            <label for="bill-reason">原因说明 <span class="text-muted">选填</span></label>
            <textarea id="bill-reason" rows="2" placeholder="为什么满足/不满足？随便写写"></textarea>
          </div>
          <button type="submit" class="btn-primary" id="submit-btn">记一笔 ✨</button>
        </form>
      </section>

      <!-- 账单 -->
      <section id="tab-bills" class="tab-content">
        <div class="month-nav">
          <button type="button" class="month-arrow" id="bills-prev">‹</button>
          <span class="month-label" id="bills-month-label"></span>
          <button type="button" class="month-arrow" id="bills-next">›</button>
        </div>
        <div class="month-summary-bar" id="bills-summary-bar"></div>
        <div id="bills-list"></div>
      </section>

      <!-- 总结 -->
      <section id="tab-summary" class="tab-content">
        <div class="month-nav">
          <button type="button" class="month-arrow" id="summary-prev">‹</button>
          <span class="month-label" id="summary-month-label"></span>
          <button type="button" class="month-arrow" id="summary-next">›</button>
        </div>
        <div id="summary-content"></div>
      </section>

      <!-- 搜索 -->
      <section id="tab-search" class="tab-content">
        <div class="search-box">
          <input type="text" id="search-input" placeholder="🔍 搜索物品、原因...">
        </div>
        <div class="search-filters">
          <select id="search-category">
            <option value="">全部类别</option>
          </select>
          <select id="search-satisfaction">
            <option value="">全部满足感</option>
          </select>
        </div>
        <div id="search-results"></div>
      </section>

      <!-- 预算 -->
      <section id="tab-budget" class="tab-content">
        <div class="card">
          <h3>月度预算设置</h3>
          <div class="form-group">
            <label>选择月份</label>
            <input type="month" id="budget-month">
          </div>
          <div class="form-group">
            <label for="budget-total">每月总预算（元）</label>
            <input type="number" id="budget-total" step="1" min="0" placeholder="不设上限">
          </div>
          <div id="category-budgets"></div>
          <button type="button" class="btn-primary" id="save-budget-btn">保存预算</button>
        </div>
        <div class="card" id="budget-status" style="margin-top:12px"></div>
        <div class="card" style="margin-top:12px">
          <h3>数据导出</h3>
          <p style="font-size:13px;color:var(--snow-grey);margin-bottom:12px">导出所有账单记录为 Excel 文件</p>
          <button type="button" class="btn-primary" id="export-btn">📥 导出Excel</button>
        </div>
      </section>
    </main>

    <nav class="app-nav">
      <button class="nav-btn active" data-tab="add">
        <span class="nav-icon">✏️</span>
        <span class="nav-label">记账</span>
      </button>
      <button class="nav-btn" data-tab="bills">
        <span class="nav-icon">📋</span>
        <span class="nav-label">账单</span>
      </button>
      <button class="nav-btn" data-tab="summary">
        <span class="nav-icon">📊</span>
        <span class="nav-label">总结</span>
      </button>
      <button class="nav-btn" data-tab="search">
        <span class="nav-icon">🔍</span>
        <span class="nav-label">搜索</span>
      </button>
      <button class="nav-btn" data-tab="budget">
        <span class="nav-icon">💰</span>
        <span class="nav-label">预算</span>
      </button>
    </nav>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Modal -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" id="modal"></div>
  </div>

  <script>
  (function() {
    var PASS = 'furong';
    var KEY = 'bill_auth_ok';
    if (localStorage.getItem(KEY) === '1') {
      document.getElementById('lock-screen').classList.add('hidden');
      return;
    }
    document.getElementById('app').style.display = 'none';
    function tryLogin() {
      if (document.getElementById('lock-pw').value === PASS) {
        localStorage.setItem(KEY, '1');
        document.getElementById('lock-screen').classList.add('hidden');
        document.getElementById('app').style.display = '';
      } else {
        document.getElementById('lock-err').style.display = 'block';
      }
    }
    document.getElementById('lock-btn').addEventListener('click', tryLogin);
    document.getElementById('lock-pw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') tryLogin();
    });
  })();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
